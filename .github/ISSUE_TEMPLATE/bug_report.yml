name: Bug report
description: Report a reproducible problem in the skill, CLI, session flow, or Docker usage.
title: "[Bug] "
labels: []
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact steps, command, and input when possible.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, runtime root, Docker usage, and whether market data is enabled.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant output. Remove secrets before posting.
      render: shell
